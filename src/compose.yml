services:
  mongo:
    image: mongo:7
    container_name: fin-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./database/init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: fin_tool
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    # container_name: backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/fin_tool
      PORT: "3000"         #
      TOKEN_SECRET: dev-secret-key
    ports:
      - "8081:3000"        
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    container_name: fin-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"        
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: fin-nginx
    restart: unless-stopped
    ports:
      - "8080:80"         
    depends_on:
      - backend
      - frontend
  
  ai:
    build: ./ai
    container_name: fin-ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app
      - ai_models:/app/saved_models
    environment:
      - TORCH_DISABLE_AVX2_WARNINGS=1
      - MODEL_PATH=/app/saved_models/model.pt
      - DEVICE=cpu # or cuda
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  backend_node_modules:
  ai_models:
